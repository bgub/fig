name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Build
      - run: pnpm build

      # Static checks
      - run: pnpm check

      # Tests
      - run: pnpm test

      - name: Test on Node 20.19
        uses: actions/setup-node@v7
        with:
          node-version: "20.19"

      - run: ./node_modules/.bin/vitest run --config vite.config.ts
        env:
          NODE_OPTIONS: --experimental-websocket

      - name: Test on Node 22.12
        uses: actions/setup-node@v7
        with:
          node-version: "22.12"

      - run: ./node_modules/.bin/vitest run --config vite.config.ts

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
